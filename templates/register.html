<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Inscription – 2FA</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg,#ddb2e6, #cc6ec1);
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
    }

    .card {
      background: white; border-radius: 16px;
      padding: 40px; width: 380px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }

    .icon-circle {
      width: 70px; height: 70px;
      background: linear-gradient(135deg, #4d2162, #772ec1);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 16px;
    }

    .icon-circle i { color: white; font-size: 28px; }

    h1 { text-align: center; color: #2d074b; font-size: 22px; margin-bottom: 6px; }
    .subtitle { text-align: center; color: #888; font-size: 13px; margin-bottom: 28px; }

    .input-group { position: relative; margin-bottom: 18px; }

    .input-group i {
      position: absolute; left: 14px; top: 50%;
      transform: translateY(-50%); color: #aaa; font-size: 15px;
    }

    label { display: block; font-size: 13px; color: #555; margin-bottom: 6px; font-weight: 600; }

    input {
      width: 100%; padding: 12px 14px 12px 40px;
      border: 2px solid #e0e0e0; border-radius: 8px;
      font-size: 14px; transition: border 0.2s;
    }

    input:focus { outline: none; border-color: #2E86C1; }

    button {
      width: 100%; padding: 13px;
      background: linear-gradient(135deg, #4d2162, #772ec1);
      color: white; border: none; border-radius: 8px;
      font-size: 15px; font-weight: 600; cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }

    button:hover { opacity: 0.9; }

    .error {
      background: #fdecea; color: #c0392b;
      padding: 10px 14px; border-radius: 8px;
      font-size: 13px; margin-bottom: 16px;
      border-left: 4px solid #c0392b;
      display: flex; align-items: center; gap: 8px;
    }

    .login-link { text-align: center; margin-top: 20px; font-size: 13px; color: #888; }
    .login-link a { color: #601c8e; text-decoration: none; font-weight: 600; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon-circle">
      <i class="fa-solid fa-user-plus"></i>
    </div>
    <h1>Créer un compte</h1>
    <p class="subtitle">Rejoignez le système 2FA sécurisé</p>

    {% if error %}
      <div class="error">
        <i class="fa-solid fa-triangle-exclamation"></i> {{ error }}
      </div>
    {% endif %}

    <form method="POST">
      <label>Nom d'utilisateur</label>
      <div class="input-group">
        <i class="fa-solid fa-user"></i>
        <input type="text" name="username" placeholder="Choisissez un identifiant" required>
      </div>

      <label>Adresse email</label>
      <div class="input-group">
        <i class="fa-solid fa-envelope"></i>
        <input type="email" name="email" placeholder="votre@email.com" required>
      </div>

      <label>Mot de passe</label>
      <div class="input-group">
        <i class="fa-solid fa-lock"></i>
        <input type="password" name="password" placeholder="Choisissez un mot de passe" required>
      </div>

      <button type="submit">
        <i class="fa-solid fa-user-check"></i> Créer mon compte
      </button>
    </form>

    <div class="login-link">
      Déjà un compte ?
      <a href="/login"><i class="fa-solid fa-right-to-bracket"></i> Se connecter</a>
    </div>
  </div>
</body>
</html>
